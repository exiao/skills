# Canonical claude-code-review.yml template
# Convention source: investing-log repo
# Adapt the `prompt:` section for each repo's domain.
#
# Key conventions:
# - check-author job prevents bot re-trigger loops
# - concurrency group per PR number (cancel-in-progress: false)
# - use_sticky_comment + track_progress for visible progress
# - Prompt-only review (NO plugins, NO CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS)
# - claude_args with opus primary + sonnet fallback
# - Scoped allowed-tools (read, git, gh pr/issue, search)
# - Auto-fix rules: only clear bugs, typos, missing imports, security
# - DO NOT auto-fix: design decisions, API changes, new deps, refactoring
# - Submit formal gh pr review (--approve or --request-changes)

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  check-author:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - id: check
        run: |
          AUTHOR_EMAIL=$(git log -1 --format='%ae' HEAD)
          echo "Last commit author email: $AUTHOR_EMAIL"
          if [[ "$AUTHOR_EMAIL" == *"[bot]@users.noreply.github.com" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  claude-review:
    needs: check-author
    if: |
      needs.check-author.outputs.should_run == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        timeout-minutes: 60
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        timeout-minutes: 60
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          track_progress: true
          allowed_bots: 'claude,claude[bot]'
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}.

            Read CLAUDE.md (or AGENTS.md) first, then review for:
            - Correctness of implementation
            - Bugs or logic errors
            - Security risks
            - Reliability issues (crashes, failures)
            - Missing test coverage
            - Dependency consistency (pyproject.toml + uv.lock in sync)
            - For every deleted function call or side effect, grep to find what depended on it

            DO NOT flag:
            - Style, naming, or structural preferences
            - Missing error handling for unlikely scenarios
            - "This could be slightly better" suggestions
            - Linting, formatting, or type annotations
            - Premature optimizations
            - Pre-existing issues not introduced in this PR
            - Issues on lines the author didn't modify

            If no issues: say "LGTM" and one sentence of what you reviewed.
            When flagging: 1-2 sentences max. State problem, fix, and location.

            Use full 40-char git SHA when linking to code.

            Auto-fix ONLY: clear bugs, typos, off-by-one, null checks, missing/unused imports, simple logic errors, security fixes with straightforward solutions.
            DO NOT auto-fix: design decisions, API changes, refactoring, new deps, public interface changes.

            For fixable issues: edit, commit, push, document in review comment.
            For non-fixable: describe problem and recommended solution.

            REVIEW SUBMISSION:
            - Issues found: `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Summary"`
            - LGTM: `gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM - brief summary"`
            If gh pr review fails, fall back to `gh pr comment`.

          claude_args: |
            --model claude-opus-4-6
            --fallback-model claude-sonnet-4-6
            --allowed-tools "Read,Glob,Grep,Bash(gh pr *),Bash(gh issue *),Bash(gh pr comment *),Bash(gh pr diff *),Bash(gh pr view *),Bash(gh pr review *),Bash(git diff *),Bash(git log *),Bash(git show *),Edit,Write,Bash(git add *),Bash(git commit *),Bash(git push *),WebSearch,WebFetch"
