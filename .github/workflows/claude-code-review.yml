name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: write

    steps:
      - name: Checkout repository
        timeout-minutes: 60
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        timeout-minutes: 60
        # v1.0.178 (Claude Code 2.1.215 / SDK 0.3.215) exits immediately in
        # agent mode with `is_error:true`, zero cost, and no review. Pin the
        # last known-good release until upstream resolves the regression.
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Do NOT set track_progress / use_sticky_comment on a pull_request event:
          # they force the action into "tag" mode, which discards --allowed-tools and
          # keeps only a fixed whitelist + mcp__github_* tools, stripping
          # Bash(gh pr review *) / Bash(gh pr comment *). The model then reviews but
          # has no permitted way to post, so runs go green on a placeholder and real
          # findings are lost. With a prompt present and no track_progress the detector
          # picks "agent" mode, which honors --allowed-tools and submits a formal review.
          allowed_bots: 'claude,claude[bot]'
          additional_permissions: |
            actions: write
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. For each changed skill file:
            - Check that the frontmatter (name, description) is accurate and well-written
            - Flag any hardcoded secrets, tokens, or personal data that should be env vars
            - Note any broken references (paths, tool names, commands that don't exist)
            - Call out anything that contradicts how the skill actually works
            - For every deleted function call or side effect, grep to find what depended on it. A removed side effect with no replacement is a bug.

            Keep feedback concise and actionable. Skip praise.
            Use inline comments for specific code issues.

            REVIEW SUBMISSION:
            Submit exactly one top-level review result using `gh pr review`:
            - If you found issues: `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Summary of issues found"`
            - If LGTM: `gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM - brief summary"`
            Do not also post a `gh pr comment` unless `gh pr review` fails due to permissions.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
            --model claude-opus-4-8
            --fallback-model claude-sonnet-4-6
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.anthropic.com/en/docs/claude-code/sdk#command-line for available options
